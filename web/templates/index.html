<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin to Litematica Converter</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Skin to Litematica</h1>
            <p class="subtitle">Convert Minecraft skins into buildable block sculptures</p>
        </header>

        <main>
            <!-- Tab Navigation -->
            <div class="tabs">
                <button class="tab active" data-tab="username">By Username</button>
                <button class="tab" data-tab="upload">Upload Skin</button>
            </div>

            <!-- Username Tab -->
            <div class="tab-content active" id="tab-username">
                <div class="input-section">
                    <label for="usernames">Enter Minecraft usernames (one per line):</label>
                    <textarea id="usernames" placeholder="173BIGMAC&#10;Seychelles4567&#10;Ponpon77"></textarea>
                    <button id="btn-convert-usernames" class="btn-primary">
                        <span class="btn-text">Convert All</span>
                        <span class="btn-loading" style="display:none;">Converting...</span>
                    </button>
                </div>
            </div>

            <!-- Upload Tab -->
            <div class="tab-content" id="tab-upload">
                <div class="upload-section">
                    <div class="dropzone" id="dropzone">
                        <div class="dropzone-content">
                            <span class="dropzone-icon">📁</span>
                            <p>Drag & drop skin PNG file here</p>
                            <p class="dropzone-hint">or click to browse</p>
                        </div>
                        <input type="file" id="file-input" accept=".png" hidden>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-section" id="results-section" style="display:none;">
                <h2>Results</h2>
                <div class="results-grid" id="results-grid"></div>
                <div class="batch-actions" id="batch-actions" style="display:none;">
                    <button id="btn-download-all" class="btn-secondary">
                        📦 Download All as ZIP
                    </button>
                </div>
            </div>
        </main>

        <!-- 3D Preview Modal -->
        <div class="modal" id="preview-modal">
            <div class="modal-content">
                <button class="modal-close" id="modal-close">&times;</button>
                <div class="modal-header">
                    <h3 id="modal-title">3D Preview</h3>
                </div>
                <div class="preview-container" id="preview-container"></div>
                <div class="modal-footer">
                    <button id="modal-download" class="btn-primary">Download</button>
                </div>
            </div>
        </div>

        <footer>
            <p>Made by Ponpon77 | <a href="https://github.com/ponpon77/skin-to-litematica" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="/static/js/viewer.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
